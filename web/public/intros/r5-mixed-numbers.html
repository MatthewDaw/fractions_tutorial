<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lesson — Mixed Numbers intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper-1:#ede2c8; --paper-2:#e3d4b1;
    --ink:#1c1612; --ink-soft:#3a2e24; --red:#a32a22;
    --fourths:#0a9396;   /* 4 = teal (denomColor(4)) */
    --fourths-tone:rgba(20,14,10,.34);   /* denomTone(4) */
    --fourths-cut:rgba(20,14,10,.55);    /* denomTone(4,.55) — divider */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Old Standard TT",Georgia,serif; color:var(--ink);
    background:radial-gradient(120% 100% at 50% 30%, var(--paper-1) 0%, var(--paper-2) 78%, #d8c79f 100%);
    overflow:hidden; -webkit-font-smoothing:antialiased;
  }
  #vignette{
    position:fixed; inset:0; pointer-events:none; z-index:5;
    box-shadow:inset 0 0 140px rgba(60,40,20,.30), inset 0 0 40px rgba(60,40,20,.12);
    background-image:radial-gradient(rgba(120,90,50,.05) 1px, transparent 1.4px);
    background-size:4px 4px; mix-blend-mode:multiply;
  }
  #stage{
    position:relative; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  #kicker{
    position:absolute; top:22px; left:0; right:0; text-align:center;
    font-family:"Russo One",sans-serif; letter-spacing:.16em; text-transform:uppercase;
    font-size:13px; color:var(--red);
    opacity:0; transform:translateY(-6px); transition:opacity .6s ease, transform .6s ease;
  }
  #kicker.on{opacity:.95; transform:none;}

  /* ── the working board: a VERTICAL 0→2 ruler with a tall stack of quarters ── */
  #board{ position:relative; display:flex; flex-direction:column; align-items:center; gap:16px; }

  /* ruler + tower side by side; the stack RISES so it visibly climbs past "1". */
  #stackwrap{ position:relative; display:flex; flex-direction:row; align-items:stretch;
    gap:16px; height:360px; }

  /* the vertical number line: 0 (bottom) — 1 (middle) — 2 (top), 1-whole in red */
  #ruler{ position:relative; width:44px; height:100%; }
  #ruler .axis{ position:absolute; top:0; bottom:0; left:32px; width:2px; background:var(--ink-soft); opacity:.6; }
  #ruler .tick{ position:absolute; left:24px; width:16px; height:2px; background:var(--ink-soft); transform:translateY(50%); }
  /* the in-between fourth marks: shorter, lighter ticks at every 1/4 */
  #ruler .tick.q{ left:28px; width:10px; height:2px; opacity:.45; }
  #ruler .tick.whole{ background:var(--red); width:26px; height:3px; left:14px;
    opacity:0; transition:opacity .5s ease; }
  #board.marked .tick.whole{ opacity:1; }
  #ruler .num{ position:absolute; left:2px; transform:translateY(50%);
    font-family:"Russo One",sans-serif; font-size:13px; color:var(--ink-soft); }
  #ruler .num.one{ color:var(--red); opacity:.6; transition:opacity .5s ease, font-weight .3s; }
  #board.marked .num.one{ opacity:1; font-weight:700; }
  /* t0 at the bottom, t1 at the one-whole line (50% up), t2 at the top */
  .at0{ bottom:0; } .at1{ bottom:50%; } .at2{ bottom:100%; }

  /* the stack of seven quarters, rising bottom→top (column-reverse so the FIRST
     cell sits at the bottom). The strip is 0→2 = 8 quarters tall; we shade 7. */
  #row{ position:relative; display:flex; flex-direction:column-reverse; align-items:stretch;
    width:140px; height:100%; }
  .pc{
    position:relative; width:100%; height:12.5%;   /* 1/8 of the 0→2 tower = one quarter */
    background:var(--fourths);
    border-top:1.5px solid var(--fourths-cut);
    display:flex; align-items:center; justify-content:center;
    transition:transform .55s cubic-bezier(.5,.05,.2,1), opacity .55s ease, box-shadow .35s ease, background .4s ease;
  }
  /* the grid hatch — denomHatch(4) */
  .pc .hatch{ position:absolute; inset:0; opacity:.5; pointer-events:none;
    background-image:
      repeating-linear-gradient(0deg, var(--fourths-tone) 0 1px, transparent 1px 6px),
      repeating-linear-gradient(90deg, var(--fourths-tone) 0 1px, transparent 1px 6px); }
  .pc .lab{ position:relative; font-family:"Russo One",sans-serif; font-size:12px; font-weight:700; color:var(--paper-1); }
  /* unshaded ghost quarter (the empty 8th piece at the very top, out to 2) */
  .pc.ghost{ background:transparent; border-top:1.5px dashed var(--ink-soft); box-shadow:none; }
  .pc.ghost .hatch{ display:none; }
  .pc.ghost .lab{ color:var(--ink-soft); opacity:.7; font-size:16px; }
  .pc:last-child{ border-top:none; }   /* topmost cell: no divider above it */

  /* the first FOUR quarters glow (grouping), then merge under the whole plate */
  #row.grouping .pc.g{ box-shadow:inset 0 0 0 2px var(--red); }
  #row.whole .pc.g .hatch{ opacity:0; }
  #row.whole .pc.g .lab{ opacity:0; }
  #row.whole .pc.g{ border-top:none; }
  /* the merged "1 whole" plate that slides over the BOTTOM four quarters */
  #wholeplate{ position:absolute; left:0; bottom:0; width:100%; height:50%;
    background:var(--fourths); border:2px solid var(--red); border-radius:8px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
    opacity:0; transform:scale(.96); transition:opacity .5s ease, transform .5s ease; pointer-events:none; z-index:2; }
  #board.snapped #wholeplate{ opacity:1; transform:none; }
  #wholeplate .wlab{ font-family:"Russo One",sans-serif; font-size:20px; font-weight:700; color:var(--paper-1); }
  /* once snapped, the three leftover quarters get a soft red outline */
  #board.snapped #row .pc.left{ box-shadow:inset 0 0 0 2px var(--red); }

  /* the live equation under the strip */
  #eqline{ font-family:"Old Standard TT",serif; font-size:20px; color:var(--ink-soft);
    min-height:28px; text-align:center; }
  #eqline b{ color:var(--red); }
  #eqline .f{ color:var(--fourths); font-weight:700; }

  #caption{
    position:absolute; left:50%; bottom:30px; transform:translateX(-50%);
    width:min(680px,92vw); text-align:center; font-size:25px; color:var(--ink); min-height:60px;
  }
  #caption .cap{ position:absolute; left:0; right:0; opacity:0; transform:translateY(8px);
    transition:opacity .55s ease, transform .55s ease; }
  #caption .cap.on{ opacity:1; transform:none; }
  .f{color:var(--fourths);font-weight:700;} .r{color:var(--red);font-weight:700;}

  #prog{ position:absolute; left:0; bottom:0; height:3px; width:0%;
    background:linear-gradient(90deg,var(--red),#c8643a); opacity:.6; z-index:6; }
</style>
</head>
<body>
  <div id="stage">
    <div id="kicker">Mixed Numbers</div>

    <div id="board">
      <div id="stackwrap">
        <div id="ruler">
          <div class="axis"></div>
          <div class="tick at0"></div><div class="num at0">0</div>
          <div class="tick q" style="bottom:12.5%"></div>
          <div class="tick q" style="bottom:25%"></div>
          <div class="tick q" style="bottom:37.5%"></div>
          <div class="tick whole at1"></div><div class="num one at1">1</div>
          <div class="tick q" style="bottom:62.5%"></div>
          <div class="tick q" style="bottom:75%"></div>
          <div class="tick q" style="bottom:87.5%"></div>
          <div class="tick at2"></div><div class="num at2">2</div>
        </div>
        <div id="row">
          <div id="wholeplate"><span class="wlab">1 whole</span></div>
        </div>
      </div>
      <div id="eqline"></div>
    </div>

    <div id="caption">
      <div class="cap" data-i="0">Seven quarters — a tall stack of <span class="f">fourths</span>.</div>
      <div class="cap" data-i="1">It climbs right <span class="r">past one whole</span>.</div>
      <div class="cap" data-i="2"><span class="f">Four quarters</span> make one whole.</div>
      <div class="cap" data-i="3">Group those four — they <span class="r">snap into one</span>.</div>
      <div class="cap" data-i="4"><span class="r">Three quarters</span> are left over.</div>
      <div class="cap" data-i="5">So seven fourths is <b>one and three quarters</b>.</div>
    </div>
  </div>

  <div id="prog"></div>
  <div id="vignette"></div>

<script>
(function(){
  "use strict";
  var PERSIST = "mixed.v1";
  var DURATION = 25;            // seconds
  function vrate(){ try { var s = JSON.parse(localStorage.getItem("bf_settings_v1")||"{}"); var r = +s.voiceRate; return (r>=0.5 && r<=2) ? r : 1; } catch(e){ return 1; } }
  var SHADED = 7, DEN = 4, SPAN = 8;   // 7/4 shaded on a 0→2 strip (8 quarters wide)

  function el(id){ return document.getElementById(id); }

  // build the eight quarter cells: 7 shaded, 1 ghost (to fill the strip out to 2)
  function buildRow(){
    var row = el("row");
    var plate = el("wholeplate");   // keep the plate, clear the rest
    row.innerHTML=""; row.appendChild(plate);
    for (var i=0;i<SPAN;i++){
      var d=document.createElement("div");
      var shaded = i < SHADED;
      d.className="pc" + (shaded ? "" : " ghost") + (i < DEN ? " g" : "");
      d.id="pc"+i;
      var h=document.createElement("div"); h.className="hatch"; d.appendChild(h);
      var s=document.createElement("span"); s.className="lab"; s.textContent= shaded ? "1/"+DEN : SHADED+"/"+DEN; d.appendChild(s);
      row.appendChild(d);
    }
  }
  buildRow();

  function setEq(text){ el("eqline").innerHTML = text; }

  var caps = Array.prototype.slice.call(document.querySelectorAll("#caption .cap"));
  function showCap(i){ caps.forEach(function(c,k){ c.classList.toggle("on", k===i); }); }

  var board = el("board"), row = el("row");

  // mark the three leftover quarters (indices 4,5,6) as the leftover group
  function markLeftover(on){
    for (var i=DEN;i<SHADED;i++){ var p=el("pc"+i); if (p) p.classList.toggle("left", !!on); }
  }

  var beatsDone = [];
  var BEATS = [
    [0.3, function(){ el("kicker").classList.add("on"); }],

    // Beat 1 (1.5) — "Seven quarters — a tall stack of fourths."
    [1.5, function(){ showCap(0); setEq('a stack of <span class="f">seven fourths</span>'); }],

    // Beat 2 (5.3) — "It climbs right past one whole." (light the 1 mark)
    [5.3, function(){ showCap(1); board.classList.add("marked"); setEq('<span class="f">7/4</span> runs <b>past 1</b>'); }],

    // Beat 3 (8.7) — "Four quarters make one whole." (glow the first four)
    [8.7, function(){ showCap(2); row.classList.add("grouping"); setEq('<span class="f">4/4</span> = <b>one whole</b>'); }],

    // Beat 4 (11.7) — "Group those four — they snap into one."
    [11.7, function(){
      showCap(3); row.classList.add("whole"); board.classList.add("snapped");
      setEq('four quarters &rarr; <b>1 whole</b>');
    }],

    // Beat 5 (15.9) — "Three quarters are left over."
    [15.9, function(){ showCap(4); markLeftover(true); setEq('<b>1</b> whole and <span class="f">3/4</span> left'); }],

    // Beat 6 (18.9) — "So seven fourths is one and three quarters." (7/4 = 1¾)
    [18.9, function(){ showCap(5); setEq('<b>7/4 = 1¾</b>'); }],
  ];

  function applyBeats(t){
    for (var i=0;i<BEATS.length;i++){ if (!beatsDone[i] && t >= BEATS[i][0]){ beatsDone[i]=true; try{BEATS[i][1]();}catch(e){} } }
  }

  // playhead + pause-aware clock
  try { localStorage.setItem(PERSIST+":t","0"); } catch(e){}
  var startPerf=null, elapsed=0, paused=false, lastWall=0;
  function frame(now){
    if (startPerf===null){ startPerf=now; lastWall=now; }
    if (!paused){ var dt=(now-lastWall)/1000; if (dt>0.25) dt=0.25; elapsed += dt * vrate(); }
    lastWall=now;
    var t=elapsed; if (t>DURATION) t=DURATION;
    try { localStorage.setItem(PERSIST+":t", t.toFixed(3)); } catch(e){}
    applyBeats(t);
    el("prog").style.width=(Math.min(t,DURATION)/DURATION*100)+"%";
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  window.__anim = {
    play:  function(){ paused=false; },
    pause: function(){ paused=true;  },
    seek:  function(s){
      elapsed=Math.max(0,+s||0); beatsDone=[];
      // rebuild to the clean start so a seek-back replays cleanly
      board.classList.remove("marked"); board.classList.remove("snapped");
      row.classList.remove("grouping"); row.classList.remove("whole");
      buildRow(); markLeftover(false);
      setEq(""); showCap(-1);
    }
  };
})();
</script>
</body>
</html>
