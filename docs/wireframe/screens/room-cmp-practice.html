<!DOCTYPE html>
<!--
  room-cmp-practice.html — HIGH-FIDELITY wireframe for Lesson №6 "Compare & Check",
  ★ PRACTICE stage (room cmp, node COMPARE_BENCHMARK). Source: web/src/AppCompare.jsx
  + web/src/components/GenPracticeBoard.jsx + generators/compareBenchmark.js.
  Real DOM mirrored (LessonShell → topbar + StageTabs + LessonGoal; the body is the
  GenPracticeBoard surface — NO LessonBoard, NO canvas). QuestionBand is HIDDEN on the
  practice stage (band=null), exactly as the real app omits it here.
  GenPracticeBoard for COMPARE_BENCHMARK uses the RELATION answer shape: two relation
  buttons ("is less than" / "is greater than"), so there is NO separate Check button.
  Representative state: a fresh same-denominator variation 3/4 ? 1/4, unanswered, with
  the quiet "Need a hint?" affordance collapsed. Real CSS reused; Cook is not part of
  this surface.
  NAV: back ← → world.html · rewatch ↻ → intro.html · reset ⟲ inert · 4 stage tabs
  REAL <a href> (this one current). Relation buttons + hint are inert.
-->

<body>
  <nav class="wf-toolbar">

  <div id="fit"><div id="stage" style="width:1280px;height:800px;">

    <div class="page" data-vox-speaker="cook">

        <div style="display:flex; align-items:center; gap:14px;">
          <span class="num-mark">№6</span>

            <div class="puzzle-title">Compare &amp; Check</div>

        </div>
        <div aria-hidden="true"></div>
        <div class="controls">
          <a class="ctrl-btn" href="world.html" title="Back to the lesson map">←</a>
          <a class="ctrl-btn" href="intro.html" title="Rewatch the intro video" aria-label="Rewatch the intro video">

          <span class="stage-tab-tx"><span class="stage-tab-name">Compare</span><span class="stage-tab-sub">Which is bigger? Pick &lt; = or &gt;</span></span>

        </a>
        <a class="stage-tab is-done" role="tab" aria-selected="false" href="room-cmp-3-reason.html" title="Is the sum less, about, or more than 1?">
          <span class="stage-tab-n">3</span>
          <span class="stage-tab-tx"><span class="stage-tab-name">Reason</span><span class="stage-tab-sub">Is the sum less, about, or more than 1?</span></span>

      <!-- ── LessonGoal (practice goal copy is empty in the source) ───────── -->
      <div class="goal">
        <button class="speaker">
          <svg width="16" height="14" viewBox="0 0 16 14"><path d="M1 5 H4 L8 1 V13 L4 9 H1 Z" fill="var(--red)" /><path d="M11 4 Q14 7 11 10" stroke="var(--red)" stroke-width="1.4" fill="none" /></svg>
          Read aloud
        </button>
        <div class="goal-text" data-vox="cmpGoal" data-vox-speaker="mom"></div>
      </div>

      <!-- ── GenPracticeBoard surface (replaces LessonBoard; skill answer = relation) ── -->
      <div class="gen-practice">
        <div class="gen-practice__q">
          <span class="gen-practice__prompt">3/4 ? 1/4</span>
        </div>
        <div class="gen-practice__answer">
          <!-- relation shape → two .check relation buttons, NO separate Check -->
          <div style="display:flex; gap:12px; justify-content:center;">
            <button type="button" class="check">is less than</button>
            <button type="button" class="check">is greater than</button>
          </div>
        </div>
        <!-- Hint ladder — quiet affordance, collapsed (no rung revealed yet) -->
        <div class="gen-practice__hints">
          <button type="button" class="gen-practice__hint-btn">Need a hint?</button>
        </div>
