<!DOCTYPE html>
<!--
  review.html — HIGH-FIDELITY wireframe of the U8 "Mixed Basket" interleaved review.
  Source: web/src/MixedReview.jsx (renders Slate.jsx for the answer surface).

  Representative snapshot (the READY state, eligible.length >= 2):
    skills introduced → eligible = the room titles the learner has met
    trial 0 → skill = eligible[0] (a fraction-add recipe) → problem.prompt "3/8 + 1/4"
    done = 4 ("solved 4 so far")
  The real component shows EITHER the identify phase OR the solve phase. Per the
  rebuild brief, BOTH the phase-1 type-identification choices AND the phase-2
  answer slate are rendered here so the wireframe documents both surfaces; the
  status ribbon ("Yes — now solve it.", tone ok) is the bridge the component
  shows after a correct identify. Mirrors the JSX DOM with identical classNames.

  SVG note: Slate.jsx paints the child's handwriting onto a live <canvas> (no
  vector artwork). The canvas is mirrored as an empty <canvas> element with the
  real classNames; nothing is simplified away.

  Nav: onExit (.mixreview__back) → world.html. Choice / Check buttons are inert.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mixed Basket · #/review — Babushka's Fractions (wireframe)</title>

  <!-- real app fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=Russo+One&family=Stardos+Stencil:wght@400;700&family=Special+Elite&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- real app CSS: tokens FIRST, then this screen's stylesheets -->
  <link rel="stylesheet" href="../css/app/tokens.css" />
  <link rel="stylesheet" href="../css/app/lesson.css" />
  <link rel="stylesheet" href="../css/app/world.css" />
  <link rel="stylesheet" href="../css/app/mixreview.css" />
  <link rel="stylesheet" href="../css/app/slate.css" />
  <link rel="stylesheet" href="../css/app/lesson-board.css" />
  <link rel="stylesheet" href="../css/app/questionband.css" />

  <!-- wireframe shell chrome LAST (desk + toolbar; not part of the app) -->
  <link rel="stylesheet" href="../css/wf-shell.css" />
</head>
<body>
  <nav class="wf-toolbar">
    <a href="../index.html">⌂ All screens</a>
    <span class="wf-tb-title">Mixed Basket <small>· #/review</small></span>
    <span class="wf-tb-spacer"></span>
    <span class="wf-tb-badge">WIREFRAME</span>
  </nav>

  <div id="fit"><div id="stage" style="width:1280px; height:800px; position:relative; overflow:hidden;">

    <!-- MixedReview.jsx — ready (eligible.length >= 2) -->
    <div class="mixreview">

      <!-- onExit → back to the map -->
      <a class="mixreview__back" href="world.html">←</a>

      <h2 class="mixreview__title">Mixed Basket</h2>
      <p class="mixreview__sub">Babushka mixed the recipes together — solved 4 so far.</p>

      <!-- problem.prompt — rotating equation, rendered as plain text -->
      <div class="mixreview__prompt">3/8 + 1/4</div>

      <!-- PHASE 1 — identify: one choice per introduced recipe (LABEL[s] = room title) -->
      <div class="mixreview__identify">
        <p class="mixreview__q">Which recipe is this?</p>
        <div class="mixreview__choices">
          <button type="button" class="mixreview__choice">Equal Groups</button>
          <button type="button" class="mixreview__choice">Times Facts</button>
          <button type="button" class="mixreview__choice">On the Number Line</button>
          <button type="button" class="mixreview__choice">Same Denominators</button>
          <button type="button" class="mixreview__choice">Taking Away</button>
          <button type="button" class="mixreview__choice">Compare &amp; Check</button>
          <button type="button" class="mixreview__choice">Scale One</button>
        </div>
      </div>

      <!-- PHASE 2 — solve: the answer Slate (shape "fraction" → stacked num/den) -->
      <div class="mixreview__solve">
        <!-- Slate layout="fraction": top cell + denominator bar + bottom cell -->
        <div class="slate slate-fraction" role="group" aria-label="write your answer as a fraction">
          <!-- top (numerator) slot — autoFocusKey "n": shows the ✎ write cue -->
          <div class="slate-slot">
            <div class="slate-cell">
              <canvas class="slate-canvas" role="img" aria-label="write the top digit"></canvas>
              <span class="slate-ph" aria-hidden="true">✎</span>
            </div>
          </div>
          <span class="slate-bar" aria-hidden="true"></span>
          <!-- bottom (denominator) slot -->
          <div class="slate-slot">
            <div class="slate-cell">
              <canvas class="slate-canvas" role="img" aria-label="write the bottom digit"></canvas>
              <span class="slate-ph" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </div>

      <!-- status ribbon — tone ok after a correct identify -->
      <div class="ribbon ribbon--ok">Yes — now solve it.</div>

    </div>

  </div></div>

  <script src="../js/fit.js"></script>
</body>
</html>
